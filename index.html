<!DOCTYPE html>
<html>
<head>
<title>Ma carte ClickUp</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
#map {
    height: 600px;
    width: 100%;
}
</style>

</head>

<body>

<h2>Carte des interventions</h2>

<div id="map"></div>

<script>

var map = L.map('map').setView([45.45703286550764, -73.30365806078582], 12);

L.tileLayer(
'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
{
    attribution:'© OpenStreetMap'
}
).addTo(map);


// Point central Seray Auto
L.marker([45.45703286550764, -73.30365806078582])
.addTo(map)
.bindPopup("Seray Auto - Chambly");


// Chargement automatique des clients
fetch("clients.json")
.then(response => response.json())
.then(clients => {

    clients.forEach(client => {

        L.marker([
            client.lat,
            client.lng
        ])
        .addTo(map)
        .bindPopup(
            "<b>" + client.nom + "</b><br>" +
            client.adresse + "<br>" +
            "Stock : " + client.stock
        );

    });

})
.catch(error => {
    console.log("Erreur de chargement clients.json :", error);
});


</script>

</body>
</html>
