<!DOCTYPE html>
<html>
<head>
<title>Ma carte ClickUp</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
#map {
height: 600px;
width: 100%;
}
</style>

</head>

<body>

<h2>Carte des interventions</h2>

<div id="map"></div>

<script>

var map = L.map('map').setView([45.45703286550764, -73.30365806078582],6);

L.tileLayer(
'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
{
attribution:'© OpenStreetMap'
}
).addTo(map);


L.marker([45.45703286550764, -73.30365806078582])
.addTo(map)
.bindPopup("Chambly");

</script>

</body>
</html>
